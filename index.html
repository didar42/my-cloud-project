<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Project — Done</title>
    <style>
        /* Основной дизайн */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
            padding: 40px 20px;
        }

        /* Контейнер формы */
        .form-container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 360px; 
            margin-bottom: 30px; 
        }

        h3, h4 { margin-top: 0; color: #1c1e21; text-align: center; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #dddfe2; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 15px;
        }

        input:focus { border-color: #1877f2; outline: none; }

        button#sendBtn { 
            width: 100%; 
            padding: 12px; 
            background-color: #f4b400; 
            border: none; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
        }

        button#sendBtn:hover { background-color: #dfa400; }

        /* Список заявок */
        #requestsList { 
            width: 100%; 
            max-width: 360px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }

        .request-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #ebedf0; 
        }

        .request-item:last-child { border-bottom: none; }

        .info strong { display: block; color: #1c1e21; font-size: 14px; }
        .info span { color: #606770; font-size: 13px; }

        /* Кнопка лайка 👍 */
        .like-btn { 
            background: #f0f2f5; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            color: #1877f2; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            transition: background 0.2s;
        }

        .like-btn:hover { background: #e4e6e9; }
    </style>
</head>
<body>

    <div class="form-container">
        <form id="feedbackForm">
            <h3>Отправить заявку</h3>
            <input type="text" id="userName" placeholder="Ваше имя" required>
            <input type="email" id="userEmail" placeholder="Ваш Email" required>
            <button type="submit" id="sendBtn">Отправить в облако</button>
        </form>
    </div>

    <div id="requestsList">
        <h4>Последние заявки:</h4>
        <div id="dataContainer">Загрузка данных...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // ТВОИ КЛЮЧИ
        const firebaseConfig = { 
            apiKey: "AIzaSyAAL14ioQFbNE40Xpkf_GlnFp7Peklvn-s", 
            authDomain: "test-test-cd48d.firebaseapp.com", 
            projectId: "test-test-cd48d", 
            storageBucket: "test-test-cd48d.firebasestorage.app", 
            messagingSenderId: "182391984233", 
            appId: "1:182391984233:web:046e3d97f59aeabe61d2f8", 
            measurementId: "G-MESTWV0ER6" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; // Для теста в консоли

        const dataContainer = document.getElementById("dataContainer");

        // Real-time прослушивание
        onSnapshot(collection(db, "requests"), (snapshot) => {
            dataContainer.innerHTML = ""; 
            snapshot.forEach((snapshotDoc) => {
                const data = snapshotDoc.data();
                const div = document.createElement("div");
                div.className = "request-item";
                div.innerHTML = `
                    <div class="info">
                        <strong>${data.name}</strong>
                        <span>${data.email}</span>
                    </div>
                    <button class="like-btn" onclick="window.addLike('${snapshotDoc.id}')">
                        👍 <span>${data.likes || 0}</span>
                    </button>
                `;
                dataContainer.appendChild(div);
            });
        });

        // Функция лайка
        window.addLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                alert("Ошибка! Проверь Rules в Firebase.");
            }
        };

        // Отправка формы
        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("userName").value;
            const email = document.getElementById("userEmail").value;
            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    timestamp: new Date()
                });
                document.getElementById("feedbackForm").reset();
            } catch (err) {
                alert("Ошибка записи!");
            }
        });
    </script>
</body>
</html>
