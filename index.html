<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <title>Base</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f4f7f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      .container {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 15px rgba(0, 0, 0, 0.05);
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 5px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .button-main {
        background: #4B84F6;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 6px;
        width: 100%;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }
      .post {
        background: #fff;
        border: 1px solid #eee;
        padding: 5px;
        margin-top: 15px;
        border-radius: 5px;
        width: 100%;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }
      .like-btn {
        cursor: pointer;
        border: none;
        background: #FBEDEA;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 14px;
        transition: 0.25s;
      }
      .like-btn:hover {
        background-color: #e2e2e2;
      }
      .time {
        font-size: 12px;
        color: #999;
        float: right;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h3>Панель управления данными</h3>
      <input type="text" id="name" placeholder="Ваше имя">
      <input type="email" id="email" placeholder="Рабочий Email">
      <button id="mainBtn">Отправить в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
      // Your Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAAL14ioQFbNE40Xpkf_GlnFp7Peklvn-s",
        authDomain: "test-test-cd48d.firebaseapp.com",
        projectId: "test-test-cd48d",
        storageBucket: "test-test-cd48d.firebasestorage.app",
        messagingSenderId: "182391984233",
        appId: "1:182391984233:web:046e3d97f59aeabe61d2f8",
        measurementId: "G-MESTWV0ER6"
      };

      // Import the functions you need from the SDKs
      import { initializeApp } from "firebase/app";
      import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
      import { getAnalytics } from "firebase/analytics";

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const analytics = getAnalytics(app);

      document.getElementById('mainBtn').onclick = async () => {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        try {
          await addDoc(collection(db, "requests"), {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            likes: 0,
            timestamp: serverTimestamp()
          });
        } catch (e) {
          alert("Ошибка безопасности: Данные отклонены сервером.");
        }
        btn.disabled = false;
      }

      const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snapshot.forEach((doc) => {
          const data = doc.data();
          feed.innerHTML += `
            <div class="post">
              <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
              <b>${data.name}</b>
              <p>${data.email}</p>
              <button class="like-btn" onclick="processLike('${doc.id}')">${data.likes || 0}</button>
            </div>
          `;
        });
      });

      async function processLike(id) {
        const docRef = doc(db, "requests", id);
        await updateDoc(docRef, { likes: increment(1) });
      }
    </script>
  </body>
</html>
