<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa400; }
    </style>
</head>
<body>
<div class="form-container">
    <form id="feedbackForm">
        <h3 style="text-align: center;">Отправить заявку</h3>
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAAL14ioQFbNE40Xpkf_GlnFp7Peklvn-s", 
        authDomain: "test-test-cd48d.firebaseapp.com", 
        projectId: "test-test-cd48d", 
        storageBucket: "test-test-cd48d.firebasestorage.app", 
        messagingSenderId: "182391984233", 
        appId: "1:182391984233:web:046e3d97f59aeabe61d2f8", 
        measurementId: "G-MESTWV0ER6" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const nameInput = document.getElementById("userName").value;
        const emailInput = document.getElementById("userEmail").value;
        try {
            await addDoc(collection(db, "requests"), {
                name: nameInput,
                email: emailInput,
                timestamp: new Date()
            });
            alert("Готово! Данные сохранены в Firebase.");
            document.getElementById("feedbackForm").reset();
        } catch (error) {
            console.error("Ошибка: ", error);
            alert("Ошибка при отправке.");
        }
    });
</script>
</body>
</html>
