<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - MyCloudApp (Method 6)</title>
    <style>
        /* Основные стили */
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button#mainBtn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        button#mainBtn:hover {
            background: #0056b3;
        }

        /* Стили для карточек */
        .post {
            background: #fff;
            border: 1px solid #eeeeee;
            padding: 20px;
            margin-top: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Стили для хедера карточки */
        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        /* Стили для аватарки */
        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #007bff;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Стили для лайков */
        .like-btn {
            cursor: pointer;
            border: 1px solid #007bff;
            background: #f1f7ff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            transition: 0.3s;
            color: #007bff;
            font-weight: bold;
        }

        .like-btn:hover {
            background: #e6f0ff;
        }

        /* Время публикации */
        .time {
            font-size: 12px;
            color: #777;
            margin-left: auto;
        }

        /* Контент поста */
        .post-content {
            margin-top: 10px;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit" id="mainBtn">Опубликовать в облако</button>
    </form>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // ТВОИ КЛЮЧИ (из последнего кода)
    const firebaseConfig = {
        apiKey: "AIzaSyB9cmkm9COSfICEZQClLRh_89IYLBpe3TI",
        authDomain: "mycloudapp-60f78.firebaseapp.com",
        projectId: "mycloudapp-60f78",
        storageBucket: "mycloudapp-60f78.firebasestorage.app",
        messagingSenderId: "961637662881",
        appId: "1:961637662881:web:0a102ceb34c1772f9530e0",
        measurementId: "G-4VQF1KG8X7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db; // Для теста безопасности в консоли

    // 1. ОТПРАВКА ДАННЫХ (Форма)
    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("userName").value;
        const email = document.getElementById("userEmail").value;

        try {
            await addDoc(collection(db, "requests"), {
                name: name,
                email: email,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById("feedbackForm").reset();
        } catch (err) {
            alert("Ошибка записи! Проверь Rules.");
        }
    });

    // 2. ФУНКЦИЯ ЛАЙКА
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) {
            console.error("Ошибка лайка:", e);
        }
    };

    // 3. REAL-TIME ЛЕНТА (Дизайн как на фото)
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        snapshot.forEach((docItem) => {
            const data = docItem.data();
            const time = data.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || '--:--';
            
            feed.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <div class="post-avatar">👤</div>
                        <div>
                            <strong>${data.name}</strong><br>
                            <small style="color: #666">${data.email}</small>
                        </div>
                        <span class="time">${time}</span>
                    </div>
                    <div class="post-content">Новая заявка в системе.</div>
                    <button class="like-btn" onclick="processLike('${docItem.id}')">👍 ${data.likes || 0}</button>
                </div>
            `;
        });
    });
</script>

</body>
</html>
